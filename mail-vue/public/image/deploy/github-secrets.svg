<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" role="img" aria-labelledby="title desc">
  <title id="title">Configure GitHub Actions secrets</title><desc id="desc">Store Cloudflare credentials and CloudMail settings as encrypted repository secrets.</desc><rect width="640" height="300" rx="18" fill="#f6f8fa"/><rect x="70" y="38" width="500" height="224" rx="14" fill="#fff" stroke="#d0d7de" stroke-width="2"/><rect x="70" y="38" width="500" height="48" rx="14" fill="#24292f"/><circle cx="100" cy="62" r="11" fill="#fff"/><text x="123" y="68" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#fff">Repository secrets</text>
  <g font-family="Consolas,monospace" font-size="14" fill="#24292f"><text x="105" y="121">CLOUDFLARE_API_TOKEN</text><text x="105" y="157">CLOUDFLARE_ACCOUNT_ID</text><text x="105" y="193">DOMAIN</text><text x="105" y="229">JWT_SECRET</text></g><g fill="#ddf4ff" stroke="#54aeff"><rect x="345" y="101" width="180" height="26" rx="6"/><rect x="345" y="137" width="180" height="26" rx="6"/><rect x="345" y="173" width="180" height="26" rx="6"/><rect x="345" y="209" width="180" height="26" rx="6"/></g><g font-family="Consolas,monospace" font-size="17" fill="#0969da"><text x="359" y="120">••••••••••••</text><text x="359" y="156">••••••••••••</text><text x="359" y="192">["example.com"]</text><text x="359" y="228">••••••••••••</text></g><path d="M551 53v18M542 62h18" stroke="#2da44e" stroke-width="3" stroke-linecap="round"/>
</svg>
